    <title>prism-focus</title>

      name="description"
      content="Local-first productivity dashboard designed for ADHD and autism."
    />

    <!-- Vendored icons + fonts — works offline and on GitHub Pages -->
    <link rel="stylesheet" href="./vendor/tabler-icons/tabler-icons.min.css" />
    <link rel="stylesheet" href="./vendor/fonts/fonts.css" />

    <style>
      @keyframes timerPulse {
        0%, 100% { box-shadow: 0 0 0 0px rgba(99,102,241,0.5); }
        50% { box-shadow: 0 0 0 5px rgba(99,102,241,0); }
      }

      @keyframes qlPop {
        0% { transform: scale(0.88); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }

      #quick-log-modal {
        animation: qlPop .15s ease-out both;
      }

      #ql-digit-display {
        transition: background .1s;
      }

      /* Audit fix #8 — keyboard focus rings for accessibility */
      :focus-visible {
        outline: 2px solid #1d5fa8;
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* Suppress default focus ring in favour of focus-visible */
      :focus:not(:focus-visible) {
        outline: none;
      }

      /* Audit fix #2 — base font weight reduction */
      body {
        -webkit-font-smoothing: antialiased;
      }

      /* Audit fix #1 — smooth border transitions */
      button, input, select, textarea {
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input:focus-visible, select:focus-visible, textarea:focus-visible {
        outline: 2px solid #1d5fa8;
        outline-offset: 0;
        border-color: #1d5fa8 !important;
      }


      /* ── Mobile responsive ─────────────────────────────────────────── */

      /* Minimum touch target size — mobile only, avoids distorting icon buttons on desktop */

      @media (max-width: 640px) {
        /* Root padding */
        #root { padding: 8px !important; }

        /* Single-column widget grid */
        #widget-grid { grid-template-columns: 1fr !important; }

        /* All widget wrappers full width */
        #widget-grid > div { grid-column: 1 / -1 !important; }

        /* Timer bar: collapse to single column, controls row on top */
        .timer-bar-grid {
          grid-template-columns: 1fr !important;
        }
        .timer-controls-col {
          border-right: none !important;
          border-bottom: 1px solid var(--border-col, #d0e8de);
          flex-direction: row !important;
          flex-wrap: wrap !important;
          padding: 8px !important;
          min-width: 0 !important;
          gap: 5px;
        }
        /* Hide clock ring column and drag handle on mobile — not needed */
        .timer-clock-col { display: none !important; }
        .timer-drag-handle { display: none !important; }

        .timer-task-col { padding: 10px 14px !important; }

        /* Board cards: tighter min so two fit per row */
        .board-card-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
        }

        /* Category filter tabs: scroll horizontally, no wrap */
        .cat-tabs {
          overflow-x: auto !important;
          flex-wrap: nowrap !important;
          padding-bottom: 4px;
          -webkit-overflow-scrolling: touch;
        }
        /* Prevent tab buttons from shrinking below label width */
        .cat-tabs button { flex-shrink: 0; }

        /* Task sort row: wrap onto next line if needed */
        .task-sort-row { flex-wrap: wrap !important; }

        /* Inputs: 16px prevents iOS auto-zoom on focus */
        input, select, textarea { font-size: 16px !important; }

        /* Header date: hide on narrow screens to save space */
        .header-date { display: none !important; }

        /* Touch targets: only enlarge on mobile so desktop icon buttons stay circular */
        button { min-height: 38px; }
      }
    </style>
