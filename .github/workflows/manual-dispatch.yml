name: Manual CI Dispatch (prism-focus)

on:
  workflow_dispatch: {}

jobs:
  run-tests:
    uses: devknowsdev/workspace-meta/.github/workflows/reusable-run-tests.yml@main
    with:
      node_version: '22'
      test_commands: 'node src/test_workflows.js'

  deploy-pages:
    needs: run-tests
    uses: devknowsdev/workspace-meta/.github/workflows/reusable-deploy-adhd.yml@main
    with:
      build_dir: '.'
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
