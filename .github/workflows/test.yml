name: Run ADHDashboard Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-tests:
    uses: devknowsdev/workspace-meta/.github/workflows/reusable-run-tests.yml@main
    with:
      node_version: '22'
      test_commands: 'node src/test_workflows.js'
name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run workflow tests
        run: node src/test_workflows.js
      - name: Validate architecture
        run: python3 tools/validate_architecture.py
